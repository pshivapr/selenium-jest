version: '3.8'

services:
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_NODE_SESSION_TIMEOUT=300
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:latest
    container_name: selenium-chrome
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
    shm_size: 2gb
    networks:
      - selenium-grid

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selenium-jest-tests
    depends_on:
      - selenium-hub
      - chrome
    environment:
      - HEADLESS=true
      - BROWSER=chrome
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./test-results:/app/test-results
    networks:
      - selenium-grid
    command: npm test

networks:
  selenium-grid:
    driver: bridge
